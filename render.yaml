services:
  - type: web
    name: gnx-backend-api
    runtime: node
    region: oregon
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_WEBHOOK_SECRET
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_STARTER_MONTHLY_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_STARTER_ANNUAL_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_GROWTH_MONTHLY_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_GROWTH_ANNUAL_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_SCALE_MONTHLY_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_SCALE_ANNUAL_AMOUNT
        sync: false
      - key: BILLING_GRACE_PERIOD_DAYS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: gnx-backend-worker
    runtime: node
    region: oregon
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run workers
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_WEBHOOK_SECRET
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_STARTER_MONTHLY_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_STARTER_ANNUAL_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_GROWTH_MONTHLY_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_GROWTH_ANNUAL_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_SCALE_MONTHLY_AMOUNT
        sync: false
      - key: RAZORPAY_PLAN_SCALE_ANNUAL_AMOUNT
        sync: false
      - key: BILLING_GRACE_PERIOD_DAYS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: REDIS_URL
        sync: false
